function toMin(t) {
  if (!t || t.startsWith("翌")) return Infinity;
  const [h, m] = t.split(":").map(Number);
  return h * 60 + m;
}
function addMin(t, n) {
  if (!t || t.startsWith("翌")) return t;
  const [h, m] = t.split(":").map(Number);
  const tot = h * 60 + m + n;
  const nh = Math.floor(tot / 60), nm = tot % 60;
  const pad = v => String(v).padStart(2, "0");
  return nh >= 24 ? `翌${pad(nh - 24)}:${pad(nm)}` : `${pad(nh)}:${pad(nm)}`;
}
function travelMin(dep) {
  const m = toMin(dep);
  if (m < 7 * 60) return 95;
  if (m < 9 * 60) return 99;
  if (m < 17 * 60) return 100;
  return 97;
}
function makeGmapsUrl(timeStr, destination) {
  if (!timeStr || timeStr.startsWith("翌")) return null;
  const [h, m] = timeStr.split(":").map(Number);
  const now = new Date();
  const d = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0);
  const unix = Math.floor(d.getTime() / 1000);
  return `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(destination)}&travelmode=transit&arrival_time=${unix}`;
}
function nowMin() {
  const d = new Date();
  return d.getHours() * 60 + d.getMinutes();
}
function nextIdx(data, key) {
  const now = nowMin();
  for (let i = 0; i < data.length; i++) if (toMin(key(data[i])) >= now) return i;
  return -1;
}

function thSt() {

    whiteSpace: "nowrap", position: "sticky", top: 0, zIndex: 5,
  };
}
function rowSt(past, next) {
  return {
    background: next ? "rgba(255,200,50,0.11)" : past ? "rgba(255,255,255,0.02)" : "transparent",
    borderBottom: "1px solid rgba(255,255,255,0.04)",
  };
}
function timeSt(past, next, dim) {
  return {
    padding: "9px 12px", fontFamily: mono, fontVariantNumeric: "tabular-nums",
    fontWeight: next && !dim ? 700 : 400, fontSize: dim ? 13 : 15,
    color: past ? "#2d4155" : next ? (dim ? "rgba(255,216,77,0.65)" : "#ffd84d") : (dim ? "rgba(200,216,232,0.45)" : "#e8f4ff"),
    textAlign: "center", whiteSpace: "nowrap",
  };
}
function tdSt(past) {
  return { padding: "9px 12px", color: past ? "#2d4155" : "#c8d8e8", textAlign: "center", whiteSpace: "nowrap" };
}

    const d = new Date().getDay();
    return d === 0 || d === 6 ? "holiday" : "weekday";
  });
  const [, setTick] = useState(0);

  useEffect(() => {
    const t = setInterval(() => setTick(v => v + 1), 30000);
    return () => clearInterval(t);
  }, []);

  const upData   = dow === "weekday" ? UP_WEEKDAY   : UP_HOLIDAY;
  const downData = dow === "weekday" ? DOWN_WEEKDAY : DOWN_HOLIDAY;
  const upNext   = nextIdx(upData,   r => r.dep);
  const downNext = nextIdx(downData, r => r.ueno);

  const Btn = ({ active, color, children, onClick }) => (
    <button onClick={onClick} style={{
      padding: "7px 14px", fontSize: 12, fontWeight: active ? 700 : 400,
      cursor: "pointer", background: active ? color : "transparent",
      color: active ? "#fff" : "#6a94b8", border: "none", letterSpacing: "0.04em",
      WebkitTapHighlightColor: "transparent",
    }}>{children}</button>
  );

  return (
    <div style={{ fontFamily: sans, background: "#0b0f1a", height: "100dvh", display: "flex", flexDirection: "column", color: "#c8d8e8" }}>

      {/* ヘッダー */}
      <div style={{
        background: "linear-gradient(135deg,#0e3a5c,#0a2240)",
        borderBottom: "3px solid #1e6fa8",
        padding: "14px 14px 12px",
        flexShrink: 0,
      }}>
        <div style={{ fontSize: 11, letterSpacing: "0.12em", color: "#6a94b8", marginBottom: 2 }}>上野東京ライン直通</div>
        <div style={{ fontSize: 17, fontWeight: 700, color: "#fff", marginBottom: 10 }}>新町 ⇔ 上野・東京</div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <div style={{ display: "flex", background: "rgba(255,255,255,0.07)", borderRadius: 8, overflow: "hidden", border: "1px solid rgba(255,255,255,0.12)" }}>
            <Btn active={dir === "up"} color="#1e5a9c" onClick={() => setDir("up")}>▲ 新町 → 東京</Btn>
            <Btn active={dir === "down"} color="#1e5a9c" onClick={() => setDir("down")}>▼ 東京 → 新町</Btn>

            <Btn active={dow === "holiday"} color="#0e6b44" onClick={() => setDow("holiday")}>土休日</Btn>

      </div>

      {/* テーブル（ここだけスクロール） */}
      <div style={{ flex: 1, overflowY: "auto", overflowX: "auto", WebkitOverflowScrolling: "touch" }}>
        {dir === "up" ? (
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
            <thead>
              <tr>
                <th style={thSt()}>新町発</th>
                <th style={thSt()}>上野着 <span style={{ fontSize: 9, color: "#5a8aaa", fontWeight: 400 }}>参考</span></th>
                <th style={thSt()}>東京着 <span style={{ fontSize: 9, color: "#5a8aaa", fontWeight: 400 }}>参考</span></th>
              </tr>
            </thead>
            <tbody>
              {upData.map((row, i) => {
                const past = toMin(row.dep) < nowMin();
                const next = i === upNext;
                const uenoArr = addMin(row.dep, travelMin(row.dep));
                const tokyoArr = row.via === "上野止" ? null : addMin(uenoArr, 6);
                return (
                  <tr key={i} style={rowSt(past, next)}>
                    <td style={timeSt(past, next, false)}>
                      {next && <span style={{ color: "#ffd84d", marginRight: 4, fontSize: 10 }}>▶</span>}
                      {row.dep}
                    </td>
                    <td style={timeSt(past, next, true)}>
                      {row.via === "上野止" && makeGmapsUrl(uenoArr, "上野駅")
                        ? <a href={makeGmapsUrl(uenoArr, "上野駅")} target="_blank" rel="noopener" style={{ color: "inherit", textDecoration: "underline" }}>{uenoArr}</a>
                        : uenoArr}
                    </td>
                    <td style={timeSt(past, next, true)}>
                      {tokyoArr
                        ? (makeGmapsUrl(tokyoArr, "東京駅")
                          ? <a href={makeGmapsUrl(tokyoArr, "東京駅")} target="_blank" rel="noopener" style={{ color: "inherit", textDecoration: "underline" }}>{tokyoArr}</a>
                          : tokyoArr)
                        : <span style={{ color: past ? "#2d4155" : "#3a5570", fontFamily: mono }}>——</span>}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        ) : (
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
            <thead>
              <tr>
                <th style={thSt()}>東京発</th>
                <th style={thSt()}>上野発</th>
                <th style={thSt()}>種別</th>
                <th style={thSt()}>新町着</th>
              </tr>
            </thead>
            <tbody>
              {downData.map((row, i) => {
                const past = toMin(row.ueno) < nowMin();
                const next = i === downNext;
                return (
                  <tr key={i} style={rowSt(past, next)}>
                    <td style={timeSt(past, next, false)}>
                      {next && !row.origin && <span style={{ color: "#ffd84d", marginRight: 4, fontSize: 10 }}>▶</span>}
                      {row.origin
                        ? <span style={{ color: past ? "#2d4155" : "#5aaff0", fontSize: 11, fontFamily: sans }}>上野始発</span>
                        : row.tokyo}
                    </td>
                    <td style={timeSt(past, next, false)}>
                      {next && row.origin && <span style={{ color: "#ffd84d", marginRight: 4, fontSize: 10 }}>▶</span>}
                      {row.ueno}
                    </td>
                    <td style={tdSt(past)}>
                      <span style={{
                        display: "inline-block", padding: "2px 7px", borderRadius: 4, fontSize: 10, fontWeight: 700,
                        background: row.type === "快速アーバン" ? "#8b3a00" : "rgba(30,80,120,0.5)",
                        color: row.type === "快速アーバン" ? "#ffa05a" : "#6a94b8",
                        border: `1px solid ${row.type === "快速アーバン" ? "#a0440a" : "#2a5070"}`,
                      }}>{row.type}</span>
                    </td>
                    <td style={timeSt(past, false, false)}>
                      {makeGmapsUrl(row.arr, "新町駅 群馬県")
                        ? <a href={makeGmapsUrl(row.arr, "新町駅 群馬県")} target="_blank" rel="noopener" style={{ color: "inherit", textDecoration: "underline" }}>{row.arr}</a>
                        : row.arr}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>

      {/* フッター */}
      <div style={{ fontSize: 10, color: "#3a5570", padding: "8px 14px", flexShrink: 0, borderTop: "1px solid #1a3a55", lineHeight: 1.7 }}>
        ※ 2026年4月改正　上野東京ライン直通のみ（湘南新宿ライン除く）
        {dir === "up" ? "　上野着・東京着は推計値（±5分）。「——」は上野止まり" : "　東京発は目安（上野の約6分前）"}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
  </script>
</body>
</html>
